<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我的博客 - 前端开发与AI技术分享</title>
    <script>
      // GitHub Pages SPA 路由回退
      // 将当前路径存储到 sessionStorage，然后重定向到首页
      var pathSegmentsToKeep = 0;

      // 重定向到首页，同时保留原始路径信息
      var l = window.location;
      // 存储原始 URL 到 sessionStorage
      sessionStorage.setItem(
        "gh-pages-redirect",
        l.pathname + l.search + l.hash,
      );
      // 重定向到首页
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?r=1",
      );
    </script>
  </head>
  <body>
    <div
      style="
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      "
    >
      <div style="text-align: center">
        <h1 style="font-size: 2rem; margin-bottom: 1rem">正在加载...</h1>
        <p style="color: #666">页面正在重定向，请稍候...</p>
      </div>
    </div>
  </body>
</html>
